name: Markdown Link Smoke Check
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  list-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List documentation files
        run: |
          find docs -maxdepth 3 -type f | sort
