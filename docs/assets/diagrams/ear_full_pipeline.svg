<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#263238"/></marker><style>.b{fill:#fff;stroke:#263238;stroke-width:2;rx:16}.t{font:700 19px Arial;fill:#111}.s{font:500 14px Arial;fill:#333}.eq{font:600 15px Arial;fill:#1b5e20}.p{stroke:#263238;stroke-width:3;marker-end:url(#a);fill:none}.dot{fill:#e53935}</style></defs>
  <rect x="20" y="20" width="1140" height="520" rx="25" fill="#f7fff7" stroke="#cfd8dc"/>
  <text x="52" y="62" class="t">EAR Drowsiness Pipeline — Camera Frame to Alarm</text>
  <g transform="translate(55,105)"><rect class="b" width="170" height="95"/><text x="25" y="35" class="t">USB Webcam</text><text x="20" y="62" class="s">/dev/video0</text><text x="20" y="82" class="s">real-time frame</text></g>
  <g transform="translate(275,105)"><rect class="b" width="170" height="95"/><text x="25" y="35" class="t">Face Detect</text><text x="20" y="62" class="s">Haar cascade</text><text x="20" y="82" class="s">face ROI crop</text></g>
  <g transform="translate(495,105)"><rect class="b" width="170" height="95"/><text x="25" y="35" class="t">Landmarks</text><text x="20" y="62" class="s">LBF model</text><text x="20" y="82" class="s">eye p1~p6 points</text></g>
  <g transform="translate(715,105)"><rect class="b" width="190" height="95"/><text x="25" y="35" class="t">EAR Formula</text><text x="20" y="62" class="eq">(v1+v2)/(2h)</text><text x="20" y="82" class="s">눈 감으면 EAR 감소</text></g>
  <g transform="translate(955,105)"><rect class="b" width="170" height="95"/><text x="25" y="35" class="t">Decision</text><text x="20" y="62" class="s">EAR &lt; 0.22</text><text x="20" y="82" class="s">closed ≥ 2000 ms</text></g>
  <path d="M225 152 H275" class="p"/><path d="M445 152 H495" class="p"/><path d="M665 152 H715" class="p"/><path d="M905 152 H955" class="p"/>
  <g transform="translate(115,280)"><ellipse cx="145" cy="65" rx="130" ry="46" fill="#fff" stroke="#333" stroke-width="2"/><circle class="dot" cx="35" cy="65" r="9"/><circle class="dot" cx="98" cy="35" r="9"/><circle class="dot" cx="190" cy="35" r="9"/><circle class="dot" cx="255" cy="65" r="9"/><circle class="dot" cx="190" cy="95" r="9"/><circle class="dot" cx="98" cy="95" r="9"/><text x="26" y="105" class="s">p1</text><text x="88" y="25" class="s">p2</text><text x="180" y="25" class="s">p3</text><text x="250" y="105" class="s">p4</text><text x="198" y="122" class="s">p5</text><text x="88" y="122" class="s">p6</text></g>
  <rect x="470" y="275" width="595" height="120" rx="18" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="500" y="312" class="eq">EAR = ( ||p2-p6|| + ||p3-p5|| ) / ( 2||p1-p4|| )</text>
  <text x="500" y="345" class="s">open eye: vertical distance large → EAR high</text>
  <text x="500" y="370" class="s">closed eye: vertical distance small → EAR low → closed timer accumulates</text>
  <path d="M1035 200 V260" class="p"/><rect x="910" y="430" width="215" height="68" rx="16" fill="#fff8e1" stroke="#ef6c00"/><text x="942" y="460" class="t">LED/Buzzer</text><text x="935" y="482" class="s">non-blocking toggle</text>
</svg>
