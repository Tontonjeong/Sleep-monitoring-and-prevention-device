<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="720" viewBox="0 0 1220 720" role="img" aria-labelledby="title desc">
  <title id="title">Real-Time Drowsiness Monitoring and Prevention Device Full Dataflow</title>
  <desc id="desc">Two Raspberry Pi 4 nodes process PPG BPM and EAR drowsiness information through TCP IP and file IPC.</desc>
  <defs>
    <linearGradient id="nodeAHeader" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#1565c0"/>
      <stop offset="1" stop-color="#00acc1"/>
    </linearGradient>
    <linearGradient id="nodeBHeader" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2e7d32"/>
      <stop offset="1" stop-color="#7cb342"/>
    </linearGradient>
    <linearGradient id="netHeader" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ef6c00"/>
      <stop offset="1" stop-color="#fdd835"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#263238"/>
    </marker>
    <style><![CDATA[
      .page { fill:#f8fafc; stroke:#cfd8dc; stroke-width:1.5; }
      .sectionA { fill:#e3f2fd; stroke:#1565c0; stroke-width:2.2; }
      .sectionB { fill:#e8f5e9; stroke:#2e7d32; stroke-width:2.2; }
      .sectionN { fill:#fff3e0; stroke:#ef6c00; stroke-width:2.2; }
      .card { fill:#ffffff; stroke:#263238; stroke-width:1.6; }
      .cardA { stroke:#1565c0; }
      .cardB { stroke:#2e7d32; }
      .cardN { stroke:#ef6c00; }
      .title { font-family:Arial, Helvetica, sans-serif; font-size:25px; font-weight:700; fill:#102027; }
      .subtitle { font-family:Arial, Helvetica, sans-serif; font-size:14px; font-weight:500; fill:#455a64; }
      .sectionTitle { font-family:Arial, Helvetica, sans-serif; font-size:22px; font-weight:700; fill:#ffffff; }
      .small { font-family:Arial, Helvetica, sans-serif; font-size:16px; font-weight:700; fill:#263238; }
      .tiny { font-family:Arial, Helvetica, sans-serif; font-size:13px; font-weight:500; fill:#37474f; }
      .label { font-family:Arial, Helvetica, sans-serif; font-size:13px; font-weight:700; fill:#263238; }
      .pipe { stroke:#263238; stroke-width:3; marker-end:url(#arrow); fill:none; }
      .dash { stroke-dasharray:8 6; }
      .soft { stroke:#607d8b; stroke-width:2.4; marker-end:url(#arrow); fill:none; }
    ]]></style>
  </defs>

  <rect x="20" y="20" width="1180" height="680" rx="28" class="page"/>
  <text x="60" y="60" class="title">Real-Time Drowsiness Monitoring &amp; Prevention Device</text>
  <text x="60" y="84" class="subtitle">Full architecture: PPG/BPM sensing, EAR analysis, TCP/IP transport, file IPC, GPIO/I2C alarm output</text>

  <!-- Node A -->
  <rect x="55" y="112" width="330" height="528" rx="22" class="sectionA"/>
  <rect x="55" y="112" width="330" height="58" rx="22" fill="url(#nodeAHeader)"/>
  <text x="84" y="148" class="sectionTitle">Node A: Sensing Server</text>

  <rect x="85" y="195" width="270" height="74" rx="14" class="card cardA"/>
  <text x="110" y="226" class="small">PPG analog circuit</text>
  <text x="110" y="248" class="tiny">LED/photodiode → TIA → active filter</text>

  <rect x="85" y="295" width="270" height="74" rx="14" class="card cardA"/>
  <text x="110" y="326" class="small">MCP3204 ADC</text>
  <text x="110" y="348" class="tiny">12-bit CH0, SPI CE0, 1 MHz</text>

  <rect x="85" y="395" width="270" height="92" rx="14" class="card cardA"/>
  <text x="110" y="426" class="small">ppg.c / server.c</text>
  <text x="110" y="449" class="tiny">200 Hz sampling, HPF + LPF</text>
  <text x="110" y="469" class="tiny">Peak detection → IBI → BPM</text>

  <rect x="85" y="525" width="270" height="74" rx="14" class="card cardA"/>
  <text x="110" y="556" class="small">START / STOP ISR</text>
  <text x="110" y="578" class="tiny">Falling edge interrupt + debounce</text>

  <!-- Network -->
  <rect x="445" y="160" width="330" height="440" rx="22" class="sectionN"/>
  <rect x="445" y="160" width="330" height="58" rx="22" fill="url(#netHeader)"/>
  <text x="475" y="196" class="sectionTitle">Network + IPC Layer</text>

  <rect x="485" y="252" width="250" height="82" rx="14" class="card cardN"/>
  <text x="510" y="285" class="small">TCP/IP socket</text>
  <text x="510" y="308" class="tiny">socket → bind → listen → accept</text>

  <rect x="485" y="372" width="250" height="82" rx="14" class="card cardN"/>
  <text x="510" y="405" class="small">Data packet</text>
  <text x="510" y="428" class="tiny">SN-RPI-001, BPM, status</text>

  <rect x="485" y="492" width="250" height="76" rx="14" class="card cardN"/>
  <text x="510" y="523" class="small">/tmp/ear_state.txt</text>
  <text x="510" y="545" class="tiny">EAR value + drowsy flag IPC</text>

  <!-- Node B -->
  <rect x="835" y="112" width="330" height="528" rx="22" class="sectionB"/>
  <rect x="835" y="112" width="330" height="58" rx="22" fill="url(#nodeBHeader)"/>
  <text x="864" y="148" class="sectionTitle">Node B: Analysis Client</text>

  <rect x="865" y="195" width="270" height="74" rx="14" class="card cardB"/>
  <text x="890" y="226" class="small">USB webcam</text>
  <text x="890" y="248" class="tiny">Face / eye frame input</text>

  <rect x="865" y="295" width="270" height="84" rx="14" class="card cardB"/>
  <text x="890" y="328" class="small">EAR engine + run_ear.sh</text>
  <text x="890" y="352" class="tiny">Landmarks → EAR → state file</text>

  <rect x="865" y="415" width="270" height="84" rx="14" class="card cardB"/>
  <text x="890" y="448" class="small">client.c decision logic</text>
  <text x="890" y="472" class="tiny">BPM + EAR fusion, non-blocking alarm</text>

  <rect x="865" y="535" width="270" height="74" rx="14" class="card cardB"/>
  <text x="890" y="566" class="small">LCD + LED + buzzer</text>
  <text x="890" y="588" class="tiny">I2C display / GPIO alert output</text>

  <!-- Internal arrows -->
  <path d="M220 269 V295" class="pipe"/>
  <path d="M220 369 V395" class="pipe"/>
  <path d="M220 487 V525" class="soft"/>

  <path d="M1000 269 V295" class="pipe"/>
  <path d="M1000 379 V415" class="pipe"/>
  <path d="M1000 499 V535" class="pipe"/>

  <!-- Cross arrows -->
  <path d="M355 441 C410 441 420 293 485 293" class="pipe"/>
  <text x="394" y="280" class="label">TCP 5000</text>

  <path d="M735 413 C790 413 810 457 865 457" class="pipe"/>
  <text x="760" y="443" class="label">BPM / status</text>

  <path d="M735 530 C790 530 810 337 865 337" class="pipe dash"/>
  <text x="760" y="520" class="label">File IPC</text>

  <path d="M735 293 C790 293 810 337 865 337" class="soft dash"/>
  <text x="760" y="303" class="label">status=1 starts EAR</text>

  <!-- Footer -->
  <rect x="60" y="658" width="1100" height="26" rx="13" fill="#eceff1" stroke="#cfd8dc"/>
  <text x="82" y="676" class="tiny">Decision rule: EAR ≤ 0.22 for about 2 s → DROWSY → LED blink + buzzer beep + LCD state update. BPM is used as an auxiliary monitoring value.</text>
</svg>
