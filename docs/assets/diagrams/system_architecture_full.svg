<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="720" viewBox="0 0 1220 720">
  <defs>
    <linearGradient id="g1" x1="0" x2="1"><stop stop-color="#1e88e5"/><stop offset="1" stop-color="#00acc1"/></linearGradient>
    <linearGradient id="g2" x1="0" x2="1"><stop stop-color="#43a047"/><stop offset="1" stop-color="#7cb342"/></linearGradient>
    <linearGradient id="g3" x1="0" x2="1"><stop stop-color="#fb8c00"/><stop offset="1" stop-color="#fdd835"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker>
    <style>
      .box{rx:18;fill:white;stroke:#263238;stroke-width:2.2}.title{font:700 22px Arial;fill:#102027}.small{font:500 16px Arial;fill:#263238}.tiny{font:500 13px Arial;fill:#37474f}.nodeA{fill:#e3f2fd;stroke:#1565c0}.nodeB{fill:#e8f5e9;stroke:#2e7d32}.out{fill:#fff8e1;stroke:#ef6c00}.pipe{stroke:#333;stroke-width:3;marker-end:url(#arrow);fill:none}.dash{stroke-dasharray:8 6}.tag{font:700 14px Arial;fill:white}.cap{font:700 14px Arial;fill:#222}
    </style>
  </defs>
  <rect x="20" y="20" width="1180" height="680" rx="28" fill="#fafafa" stroke="#cfd8dc"/>
  <text x="60" y="64" class="title">Real-Time Drowsiness Monitoring & Prevention Device — Full Dataflow</text>
  <rect x="55" y="100" width="330" height="520" class="box nodeA"/>
  <text x="85" y="140" class="title">Node A: Sensing Server</text>
  <rect x="85" y="170" width="270" height="70" rx="14" fill="#fff" stroke="#1565c0"/><text x="110" y="200" class="small">PPG analog circuit</text><text x="110" y="222" class="tiny">LED/photodiode, TIA, active filter</text>
  <rect x="85" y="270" width="270" height="70" rx="14" fill="#fff" stroke="#1565c0"/><text x="110" y="300" class="small">MCP3204 ADC</text><text x="110" y="322" class="tiny">12-bit CH0, SPI CE0, 1 MHz</text>
  <rect x="85" y="370" width="270" height="86" rx="14" fill="#fff" stroke="#1565c0"/><text x="110" y="402" class="small">ppg.c / server.c</text><text x="110" y="425" class="tiny">200 Hz sampling, HPF+LPF</text><text x="110" y="444" class="tiny">Peak → IBI → BPM</text>
  <rect x="85" y="495" width="270" height="70" rx="14" fill="#fff" stroke="#1565c0"/><text x="110" y="525" class="small">START/STOP ISR</text><text x="110" y="547" class="tiny">Falling edge + 200 ms debounce</text>
  <rect x="445" y="180" width="330" height="420" class="box" fill="#fff3e0" stroke="#ef6c00"/>
  <text x="475" y="220" class="title">Network + IPC Layer</text>
  <rect x="485" y="260" width="250" height="80" rx="14" fill="#fff" stroke="#ef6c00"/><text x="510" y="292" class="small">TCP/IP socket</text><text x="510" y="315" class="tiny">socket → bind → listen → accept</text>
  <rect x="485" y="380" width="250" height="80" rx="14" fill="#fff" stroke="#ef6c00"/><text x="510" y="412" class="small">Packet</text><text x="510" y="435" class="tiny">SN-RPI-001,BPM,status</text>
  <rect x="485" y="500" width="250" height="70" rx="14" fill="#fff" stroke="#ef6c00"/><text x="510" y="530" class="small">/tmp/ear_state.txt</text><text x="510" y="552" class="tiny">EAR drowsy flag IPC</text>
  <rect x="835" y="100" width="330" height="520" class="box nodeB"/>
  <text x="865" y="140" class="title">Node B: Analysis Client</text>
  <rect x="865" y="170" width="270" height="70" rx="14" fill="#fff" stroke="#2e7d32"/><text x="890" y="200" class="small">USB Webcam</text><text x="890" y="222" class="tiny">face/eye frame input</text>
  <rect x="865" y="270" width="270" height="80" rx="14" fill="#fff" stroke="#2e7d32"/><text x="890" y="303" class="small">EAR Engine + run_ear.sh</text><text x="890" y="327" class="tiny">landmarks → EAR → state file</text>
  <rect x="865" y="390" width="270" height="80" rx="14" fill="#fff" stroke="#2e7d32"/><text x="890" y="423" class="small">client.c Decision</text><text x="890" y="447" class="tiny">BPM + EAR fusion, non-blocking alarm</text>
  <rect x="865" y="510" width="270" height="70" rx="14" fill="#fff" stroke="#2e7d32"/><text x="890" y="540" class="small">LCD + LED + Buzzer</text><text x="890" y="562" class="tiny">I2C / GPIO outputs</text>
  <path d="M220 240 V270" class="pipe"/><path d="M220 340 V370" class="pipe"/><path d="M220 456 V495" class="pipe"/>
  <path d="M355 413 C410 413 420 300 485 300" class="pipe"/>
  <path d="M735 420 C790 420 810 430 865 430" class="pipe"/>
  <path d="M1000 240 V270" class="pipe"/><path d="M1000 350 V390" class="pipe"/><path d="M1000 470 V510" class="pipe"/>
  <path d="M735 535 C785 535 810 310 865 310" class="pipe dash"/>
  <text x="406" y="292" class="cap">TCP 5000</text><text x="775" y="517" class="cap">File IPC</text>
</svg>
