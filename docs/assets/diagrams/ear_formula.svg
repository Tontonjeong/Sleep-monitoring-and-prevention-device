<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
<defs><style>.t{font-family:Arial,'Noto Sans KR',sans-serif}.h{font-size:28px;font-weight:700;fill:#0f172a}.m{font-size:20px;fill:#334155}.s{font-size:16px;fill:#475569}.pt{fill:#ef4444}.line{stroke:#334155;stroke-width:4;fill:none}.blue{stroke:#0ea5e9;stroke-width:5;fill:none}.green{stroke:#22c55e;stroke-width:5;fill:none}</style></defs>
<rect x="25" y="25" width="1150" height="510" rx="32" fill="#fff" stroke="#e2e8f0" stroke-width="2"/><text x="60" y="75" class="t h">EAR(Eye Aspect Ratio) 기반 졸음 판정</text>
<ellipse cx="330" cy="260" rx="230" ry="90" class="line"/><circle cx="110" cy="260" r="12" class="pt"/><circle cx="550" cy="260" r="12" class="pt"/><circle cx="245" cy="185" r="12" class="pt"/><circle cx="415" cy="185" r="12" class="pt"/><circle cx="245" cy="335" r="12" class="pt"/><circle cx="415" cy="335" r="12" class="pt"/>
<line x1="245" y1="185" x2="245" y2="335" class="blue"/><line x1="415" y1="185" x2="415" y2="335" class="blue"/><line x1="110" y1="260" x2="550" y2="260" class="green"/>
<text x="85" y="245" class="t s">P1</text><text x="563" y="245" class="t s">P4</text><text x="222" y="170" class="t s">P2</text><text x="426" y="170" class="t s">P3</text><text x="222" y="365" class="t s">P6</text><text x="426" y="365" class="t s">P5</text>
<text x="670" y="190" class="t h">EAR = (||P2-P6|| + ||P3-P5||) / (2||P1-P4||)</text>
<text x="670" y="255" class="t m">눈을 감으면 세로 거리 2개가 감소 → EAR 하락</text>
<text x="670" y="305" class="t m">구현 임계값: EAR &lt; 0.22</text>
<text x="670" y="355" class="t m">지속시간: 약 2초 이상 → DROWSY</text>
<text x="670" y="405" class="t s">run_ear.sh는 EAR engine stdout을 CSV로 필터링하고 /tmp/ear_state.txt에 최신 상태를 저장한다.</text>
</svg>
