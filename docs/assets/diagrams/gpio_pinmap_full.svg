<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
  <style>.title{font:700 22px Arial;fill:#111}.h{font:700 16px Arial;fill:#111}.s{font:500 14px Arial;fill:#333}.pin{fill:#eceff1;stroke:#455a64}.in{fill:#e3f2fd;stroke:#1565c0}.out{fill:#fff3e0;stroke:#ef6c00}.bus{fill:#e8f5e9;stroke:#2e7d32}</style>
  <rect x="20" y="20" width="1060" height="520" rx="24" fill="#fafafa" stroke="#cfd8dc"/>
  <text x="50" y="60" class="title">GPIO / Peripheral Map from Report</text>
  <rect x="55" y="95" width="485" height="380" rx="20" fill="#fff" stroke="#1565c0"/>
  <text x="80" y="130" class="h">Server Node A — sensing/transmission</text>
  <rect x="80" y="155" width="420" height="50" class="in" rx="12"/><text x="105" y="185" class="s">START Button: GPIO17 in ppg.c / GPIO22 in server.c, falling-edge ISR</text>
  <rect x="80" y="220" width="420" height="50" class="in" rx="12"/><text x="105" y="250" class="s">STOP Button: GPIO27, falling-edge ISR</text>
  <rect x="80" y="285" width="420" height="65" class="bus" rx="12"/><text x="105" y="312" class="s">MCP3204 ADC: SPI0 CE0, MISO/MOSI/SCLK, CH0 PPG input</text><text x="105" y="335" class="s">12-bit raw value: 0~4095</text>
  <rect x="80" y="365" width="420" height="70" class="bus" rx="12"/><text x="105" y="392" class="s">UART optional: /dev/serial0 115200 for BPM line output</text><text x="105" y="415" class="s">TCP server: port 5000, SN/BPM/status packet</text>
  <rect x="580" y="95" width="465" height="380" rx="20" fill="#fff" stroke="#2e7d32"/>
  <text x="605" y="130" class="h">Client Node B — analysis/alarm</text>
  <rect x="605" y="155" width="395" height="50" class="bus" rx="12"/><text x="630" y="185" class="s">USB webcam: /dev/video0 for EAR engine</text>
  <rect x="605" y="220" width="395" height="50" class="out" rx="12"/><text x="630" y="250" class="s">LED: GPIO18 in client.c, visual alarm</text>
  <rect x="605" y="285" width="395" height="50" class="out" rx="12"/><text x="630" y="315" class="s">Active Buzzer: GPIO23, audio alarm</text>
  <rect x="605" y="350" width="395" height="70" class="bus" rx="12"/><text x="630" y="377" class="s">LCD1602 I2C: address 0x27, SDA/SCL</text><text x="630" y="400" class="s">BPM bar + START/STOP status display</text>
  <text x="70" y="515" class="s">Note: report separates Raspberry Pi-to-Raspberry Pi TCP/IP from the GPIO input/output requirement; requirement is satisfied by external sensor/device I/O.</text>
</svg>
